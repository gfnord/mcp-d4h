name: Publish package

# Publishes @gfnord/mcp-d4h to BOTH the public npm registry and GitHub Packages
# whenever a version tag (v*) is pushed.
#
# Tag flow:
#   npm version patch          # bumps version + creates tag locally
#   git push --follow-tags     # pushes the tag, fires this workflow
#
# Auth model:
#   - npm public registry  -> Trusted Publishing (OIDC). NO long-lived secret.
#                             Configure once at https://www.npmjs.com/package/@gfnord/mcp-d4h/access
#                             with publisher=GitHub Actions, repo=gfnord/mcp-d4h,
#                             workflow=publish.yml. The id-token:write permission
#                             on the publish-npm job lets npm verify the OIDC
#                             token and mint a short-lived publish credential
#                             scoped to this run.
#   - GitHub Packages      -> GITHUB_TOKEN (provided automatically by Actions
#                             when permissions.packages:write is granted).
#
# Trusted Publishing requires npm CLI >= 11.5.1, which is newer than what
# Node 22 LTS ships with. We explicitly upgrade npm before publish.
#
# Security note: this workflow does NOT consume any untrusted input
# (issue titles, PR descriptions, commit messages, etc.). It only reacts to
# tag refs and uses an OIDC token whose audience is scoped to npm.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist/ entry point exists
        run: |
          test -f dist/index.js || (echo "::error::dist/index.js missing after build" && exit 1)
          head -1 dist/index.js | grep -q '^#!/usr/bin/env node' \
            || (echo "::error::shebang missing on dist/index.js" && exit 1)

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-bundle
          path: |
            dist
            package.json
            package-lock.json
            README.md
            LICENSE

  publish-npm:
    name: Publish to npm (public)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token:write is REQUIRED for Trusted Publishing OIDC exchange + provenance.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: package-bundle

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@gfnord'

      - name: Upgrade npm to a version that supports Trusted Publishing
        # Trusted Publishing OIDC was added in npm 11.5.1. Node 22 LTS ships
        # with npm 10.x, so we bump explicitly here. Safe and idempotent.
        run: npm install -g npm@latest

      - name: Publish
        # --ignore-scripts skips prepublishOnly (which would re-run tsc against
        # an artifact that has no src/). Build was already verified in the
        # build job; we ship those exact bytes.
        #
        # No NODE_AUTH_TOKEN here: npm CLI auto-detects the GitHub Actions
        # OIDC token (via ACTIONS_ID_TOKEN_REQUEST_URL / _TOKEN env vars that
        # the runner sets when id-token:write is granted) and exchanges it
        # with npm for a short-lived publish credential.
        run: npm publish --ignore-scripts --provenance --access public

  publish-github:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: package-bundle

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@gfnord'

      - name: Publish
        # --ignore-scripts: same reasoning as the npm job above.
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
